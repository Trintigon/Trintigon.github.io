<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elijah Lange-MacKinnon | Academic Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark:       #1A1B28;
      --gold:       #F5A623;
      --gold-dim:   #D9911A;
      --gold-light: #FFF8EC;
      --white:      #FFFFFF;
      --bg:         #F2F2F7;
      --text:       #1A1B28;
      --muted:      #6B7280;
      --border:     #E4E4EB;
      --sidebar:    258px;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar); background: var(--dark);
      position: fixed; top: 0; left: 0; height: 100vh;
      display: flex; flex-direction: column;
      padding: 1.75rem 1.4rem 1.4rem; z-index: 200;
    }
    .brand { display: flex; align-items: center; gap: 0.65rem; margin-bottom: 2.25rem; }
    .brand-avatar {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), #e08a00);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem; color: var(--dark); font-weight: 700; flex-shrink: 0;
    }
    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 0.88rem; color: var(--white); display: block; line-height: 1.3;
    }
    .brand-sub {
      font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.32);
    }
    .nav-section { margin-bottom: 1.5rem; }
    .nav-label {
      font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.14em; color: rgba(255,255,255,0.28);
      padding-left: 0.75rem; margin-bottom: 0.45rem; display: block;
    }
    .nav-item {
      display: flex; align-items: center; gap: 0.6rem;
      width: 100%; padding: 0.5rem 0.75rem; border-radius: 8px;
      font-size: 0.84rem; font-weight: 400; color: rgba(255,255,255,0.56);
      background: none; border: none; cursor: pointer;
      text-align: left; transition: all 0.13s; margin-bottom: 0.1rem;
    }
    .nav-item:hover  { background: rgba(245,166,35,0.1);  color: var(--gold); }
    .nav-item.active { background: rgba(245,166,35,0.18); color: var(--gold); font-weight: 600; }
    .nav-icon { font-size: 0.9rem; flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto; text-align: center;
      font-size: 0.65rem; color: rgba(255,255,255,0.18);
      border-top: 1px solid rgba(255,255,255,0.07); padding-top: 1rem;
    }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar); flex: 1; padding: 2.25rem 2.5rem; }
    #app { animation: fadeUp 0.2s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(130deg, var(--dark) 0%, #2A2B55 100%);
      border-radius: 18px; padding: 2.4rem 2.5rem;
      margin-bottom: 2rem; position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute; right: -40px; top: -40px;
      width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,166,35,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--gold); margin-bottom: 0.5rem; font-weight: 600;
    }
    .hero-name {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem; color: var(--white); line-height: 1.15; margin-bottom: 0.5rem;
    }
    .hero-name span { color: var(--gold); }
    .hero-desc { font-size: 0.88rem; color: rgba(255,255,255,0.5); max-width: 420px; line-height: 1.6; }
    .hero-chips { display: flex; gap: 0.6rem; margin-top: 1.25rem; flex-wrap: wrap; }
    .hero-chip {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.6); font-size: 0.75rem; padding: 0.3rem 0.8rem; border-radius: 99px;
    }
    .hero-chip.gold { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.35); color: var(--gold); }

    /* ── SECTION HEADING ── */
    .section-heading { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.1rem; }
    .section-heading h2 { font-size: 1rem; font-weight: 600; color: var(--text); white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── HOME CARDS ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1rem; }
    .assignment-card-home {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.35rem 1.25rem 1.2rem;
      cursor: pointer; position: relative; overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex; flex-direction: column;
    }
    .assignment-card-home::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 4px; background: var(--c-accent);
    }
    .assignment-card-home:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.1); transform: translateY(-3px); }
    .cc-icon-wrap {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--c-bg); display: flex; align-items: center;
      justify-content: center; font-size: 1.25rem; margin-bottom: 0.9rem; flex-shrink: 0;
    }
    .cc-name  { font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 0.2rem; line-height: 1.3; }
    .cc-meta  { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.9rem; }
    .cc-status { margin-top: auto; font-size: 0.75rem; font-weight: 500; color: var(--c-accent); }
    .cc-status.muted { color: var(--muted); }

    /* ── DETAIL HEADER ── */
    .detail-header {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem 1.75rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1.25rem;
      border-top: 4px solid var(--c-accent);
    }
    .back-btn {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.45rem 0.9rem;
      font-family: 'Inter', sans-serif; font-size: 0.82rem;
      color: var(--muted); cursor: pointer; flex-shrink: 0;
      transition: all 0.13s; font-weight: 500;
    }
    .back-btn:hover { background: var(--border); color: var(--text); }
    .detail-header-inner { display: flex; align-items: center; gap: 0.85rem; flex: 1; }
    .detail-header-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: var(--c-bg); display: flex; align-items: center;
      justify-content: center; font-size: 1.4rem; flex-shrink: 0;
    }
    .detail-header-name { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); }
    .detail-header-sub  { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── LINK BLOCKS ── */
    .link-list { display: flex; flex-direction: column; gap: 0; }

    /* Each block = row + optional embed below */
    .link-block {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 0.85rem; overflow: hidden;
    }
    .link-row {
      display: flex; align-items: center; gap: 1.1rem;
      padding: 1.1rem 1.4rem;
    }
    .link-row-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--c-bg); color: var(--c-accent);
      font-size: 1rem; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .link-row-info { flex: 1; min-width: 0; }
    .link-row-label  { font-weight: 600; font-size: 0.93rem; color: var(--text); }
    .link-row-status { font-size: 0.75rem; margin-top: 0.18rem; }
    .status-linked   { color: #16A34A; font-weight: 500; }
    .status-linked::before { content: '✓  '; }
    .status-missing  { color: var(--muted); }
    .link-row-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    /* ── EMBEDDED RUBRIC ── */
    .doc-embed {
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: none;
    }
    .doc-embed iframe {
      width: 100%; height: 520px; display: block; border: none;
    }

    /* ── YOUTUBE EMBED ── */
    .youtube-embed {
      border-top: 1px solid var(--border);
      position: relative; aspect-ratio: 16 / 9;
    }
    .youtube-embed iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none; display: block;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem; border-radius: 9px;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; border: none; text-decoration: none;
      white-space: nowrap; transition: all 0.14s;
    }
    .btn-primary { background: var(--gold); color: var(--dark); }
    .btn-primary:hover { background: var(--gold-dim); box-shadow: 0 2px 10px rgba(245,166,35,0.4); }
    .btn-ghost   { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-disabled {
      display: inline-flex; align-items: center;
      padding: 0.5rem 1rem; border-radius: 9px;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500;
      background: var(--bg); color: #C0C0CC; border: 1px solid var(--border);
      white-space: nowrap; cursor: not-allowed;
    }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      :root { --sidebar: 0px; }
      .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 0.75rem 1rem; gap: 0.3rem; }
      .brand, .nav-section, .sidebar-footer { display: none; }
      .main { margin-left: 0; padding: 1rem; }
      .hero { padding: 1.5rem; }
      .hero-name { font-size: 1.6rem; }
      .detail-header { flex-wrap: wrap; }
      .link-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="brand">
    <div class="brand-avatar">EL</div>
    <div>
      <span class="brand-name">Elijah Lange-MacKinnon</span>
      <span class="brand-sub">Academic Portfolio</span>
    </div>
  </div>
  <div class="nav-section">
    <span class="nav-label">Navigation</span>
    <button class="nav-item active" id="nav-home" onclick="goHome()">
      <span class="nav-icon">🏠</span> My Assignments
    </button>
  </div>
  <div class="sidebar-footer">2025–2026 Academic Year</div>
</nav>

<main class="main">
  <div id="app"></div>
</main>


<script>
/* =====================================================================

   ✏️  YOUR LINKS — EDIT THIS SECTION
   ─────────────────────────────────────────────────────────────────────
   Paste your URLs inside the quotes "".
   Leave as "" if you don't have a link yet.

   FIELDS:
     coversheet  →  Link to your Google Doc cover sheet
     rubric      →  Link to rubric (will be embeddable inline)
     artifact    →  Artifact link
                    (YouTube URLs will be auto-embedded as a video player)

   C-SPAN ONLY:
     project     →  Link to Project (only appears on the C-SPAN page)

   Save the file and refresh your browser to see changes.

===================================================================== */

const ASSIGNMENTS = [

  {
    id:        "debate",
    name:      "Debates",
    icon:      "👔",
    color:     "#7C3AED",
    colorBg:   "#F5F0FF",
		coversheet: "https://docs.google.com/document/d/1TiVKgLyd_QJ-EKOipUYgUDIrrjYlYSolB9ezrYYWWlg/edit?usp=drivesdk",  // ← Paste Link to Coversheet here
    rubric:     "https://drive.google.com/file/d/1UU-VIji6GeNv5bXtm3vWLnUxZSM5NqEs/view?usp=drivesdk",  // ← Paste Link to Rubric here
    artifact:   "https://drive.google.com/file/d/1itrpVpv9156t6EAprfidzeMlZcxhMwlA/view?usp=drivesdk",  // ← Paste Artifact link here
  },

  {
    id:        "cspan",
    name:      "C-SPAN",
    icon:      "📺",
    color:     "#1D4ED8",
    colorBg:   "#EFF4FF",
    coversheet: "https://docs.google.com/document/d/13N_GT71PJH7E4l-E64kWXP_4PSJ_49NOTmgQTNeaRMg/edit?usp=drivesdk",  // ← Paste Link to Coversheet here
    rubric:     "https://drive.google.com/file/d/1VbSNoFQxWlKhPOM9yeWjrQMBPQEKLVuX/view?usp=drivesdk",  // ← Paste Link to Rubric here
    artifact:   "https://youtu.be/37WBf9vvkzs?is=ZDy8sFjQJfEQJB8B",  // ← Paste Artifact link here
    project:    "https://youtu.be/37WBf9vvkzs?is=ZDy8sFjQJfEQJB8B",   // ← Paste Link to Project here (C-SPAN only)
  },

  {
    id:        "court",
    name:      "Court",
    icon:      "⚖️",
    color:     "#C2410C",
    colorBg:   "#FFF4EE",
    coversheet: "",   // ← Paste Link to Coversheet here
    rubric:     "https://drive.google.com/file/d/19EI-dlDOTflsa3DO75TttPli6zXhf3Uo/view?usp=drivesdk",   // ← Paste Link to Rubric here (will embed inline)
    artifact:   "",   // ← Paste Artifact link here
  },

  {
    id:        "potus",
    name:      "POTUS",
    icon:      "🏛️",
    color:     "#0F766E",
    colorBg:   "#EDFAF8",
    coversheet: "",   // ← Paste Link to Coversheet here
    rubric:     "https://drive.google.com/file/d/1_FDX743ypfUrHJXheg1IZh9oYvvYyG_m/view?usp=drivesdk",   // ← Paste Link to Rubric here (will embed inline)
    artifact:   "https://drive.google.com/file/d/1c_aMkIauE64t6c2uefxvqj6e1drOCv3N/view?usp=drivesdk",   // ← Paste Artifact link here
  }

];

/* =====================================================================
   🚫  DO NOT EDIT BELOW THIS LINE
===================================================================== */

/* ── URL HELPERS ── */

function toPreviewUrl(url) {
  if (!url) return '';
  // Google Docs
  if (url.includes('docs.google.com/document')) {
    const id = url.match(/\/document\/d\/([^\/\?]+)/)?.[1];
    return id ? `https://docs.google.com/document/d/${id}/preview` : url;
  }
  // Google Drive file
  if (url.includes('drive.google.com/file/d/')) {
    const id = url.match(/\/file\/d\/([^\/\?]+)/)?.[1];
    return id ? `https://drive.google.com/file/d/${id}/preview` : url;
  }
  // Google Slides
  if (url.includes('docs.google.com/presentation')) {
    const id = url.match(/\/presentation\/d\/([^\/\?]+)/)?.[1];
    return id ? `https://docs.google.com/presentation/d/${id}/preview` : url;
  }
  return url;
}

function toYouTubeEmbed(url) {
  if (!url) return null;
  // youtu.be/ID
  const short = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
  if (short) return `https://www.youtube.com/embed/${short[1]}`;
  // youtube.com/watch?v=ID
  const long = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
  if (long) return `https://www.youtube.com/embed/${long[1]}`;
  return null;
}

function isYouTube(url) {
  return !!url && (url.includes('youtube.com') || url.includes('youtu.be'));
}

/* ── TOGGLE RUBRIC EMBED ── */
function toggleEmbed(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const showing = el.style.display === 'block';
  el.style.display = showing ? 'none' : 'block';
  btn.textContent  = showing ? 'Expand Rubric ▾' : 'Collapse ▴';
}

/* ── RENDER ENGINE ── */
function render(html) {
  const app = document.getElementById('app');
  app.innerHTML = html;
  app.style.animation = 'none';
  requestAnimationFrame(() => { app.style.animation = 'fadeUp 0.2s ease both'; });
}

function statusBadge(url) {
  return url
    ? `<span class="status-linked">Linked</span>`
    : `<span class="status-missing">No link added yet</span>`;
}

/*
  linkBlock(icon, label, url, type, blockId)
  type: 'link' | 'rubric' | 'youtube'
*/
function linkBlock(icon, label, url, type, blockId) {
  let embedHtml   = '';
  let toggleBtn   = '';
  let openBtn     = url
    ? `<a class="btn btn-primary" href="${url}" target="_blank">Open ↗</a>`
    : `<span class="btn-disabled">No Link Yet</span>`;

  if (type === 'rubric' && url) {
    const preview = toPreviewUrl(url);
    toggleBtn = `<button class="btn btn-ghost" onclick="toggleEmbed('${blockId}', this)">Expand Rubric ▾</button>`;
    embedHtml = `<div class="doc-embed" id="${blockId}">
      <iframe src="${preview}" allowfullscreen></iframe>
    </div>`;
  }

  if (type === 'youtube') {
    const embedUrl = url ? toYouTubeEmbed(url) : null;
    openBtn = url
      ? `<a class="btn btn-primary" href="${url}" target="_blank">Open in YouTube ↗</a>`
      : `<span class="btn-disabled">No Link Yet</span>`;
    embedHtml = embedUrl
      ? `<div class="youtube-embed"><iframe src="${embedUrl}" allowfullscreen></iframe></div>`
      : '';
  }

  return `
    <div class="link-block">
      <div class="link-row">
        <div class="link-row-icon">${icon}</div>
        <div class="link-row-info">
          <div class="link-row-label">${label}</div>
          <div class="link-row-status">${statusBadge(url)}</div>
        </div>
        <div class="link-row-actions">
          ${toggleBtn}
          ${openBtn}
        </div>
      </div>
      ${embedHtml}
    </div>`;
}

/* ── HOME ── */
function goHome() {
  document.getElementById('nav-home').classList.add('active');
  render(`
    <div class="hero">
      <div class="hero-eyebrow">Academic Portfolio</div>
      <div class="hero-name">Elijah <span>Lange-MacKinnon</span></div>
      <div class="hero-desc">A record of assignments and portfolio-worthy work for the 2025–2026 academic year.</div>
      <div class="hero-chips">
        <span class="hero-chip gold">🎓 2025–2026</span>
        <span class="hero-chip">${ASSIGNMENTS.length} Assignments</span>
        <span class="hero-chip">Metacognitive Framework</span>
      </div>
    </div>

    <div class="section-heading">
      <h2>My Assignments</h2>
      <div class="section-line"></div>
    </div>

    <div class="cards-grid">
      ${ASSIGNMENTS.map(a => {
        const fields = [a.coversheet, a.rubric, a.artifact, a.project].filter(f => f !== undefined);
        const filled = fields.filter(Boolean).length;
        const total  = fields.length;
        return `
          <div class="assignment-card-home"
               style="--c-accent:${a.color}; --c-bg:${a.colorBg}"
               onclick="goDetail('${a.id}')">
            <div class="cc-icon-wrap">${a.icon}</div>
            <div class="cc-name">${a.name}</div>
            <div class="cc-meta">${filled} of ${total} links added</div>
            <div class="cc-status ${filled > 0 ? '' : 'muted'}">
              ${filled > 0 ? 'View links →' : 'No links yet'}
            </div>
          </div>`;
      }).join('')}
    </div>
  `);
}

/* ── DETAIL ── */
function goDetail(id) {
  const a = ASSIGNMENTS.find(x => x.id === id);
  if (!a) return;

  // Build link blocks
  const blocks = [
    linkBlock('📄', 'Link to Coversheet', a.coversheet, 'link',    `${id}-cs`),
    linkBlock('📋', 'Link to Rubric',     a.rubric,     'rubric',  `${id}-rubric`),
  ];

  // Artifact — YouTube for C-SPAN, regular link for others
  if (a.id === 'cspan') {
    blocks.push(linkBlock('▶️', 'Link to Project',  a.artifact, 'youtube', `${id}-artifact`));
  } else {
    blocks.push(linkBlock('🗂️', 'Link to Project', a.artifact, 'link', `${id}-artifact`));
  }

  render(`
    <div class="detail-header" style="--c-accent:${a.color}; --c-bg:${a.colorBg}">
      <button class="back-btn" onclick="goHome()">← All Assignments</button>
      <div class="detail-header-inner">
        <div class="detail-header-icon">${a.icon}</div>
        <div>
          <div class="detail-header-name">${a.name}</div>
          <div class="detail-header-sub">Assignment links</div>
        </div>
      </div>
    </div>

    <div class="section-heading">
      <h2>Links</h2>
      <div class="section-line"></div>
    </div>

    <div class="link-list" style="--c-accent:${a.color}; --c-bg:${a.colorBg}">
      ${blocks.join('')}
    </div>
  `);
}

goHome();
</script>
</body>
</html>
